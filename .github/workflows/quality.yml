name: quality
on: [pull_request, push]
permissions: { contents: read }
jobs:
  go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-go@v6.5.0
        with: { go-version: '1.26.x', check-latest: true }
      - uses: actions/setup-node@v6.4.0
        with: { node-version: 24 }
      - run: npm install -g pnpm@11.12.0
      - run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - uses: actions/cache@v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web build
      - run: gofmt -l cmd internal | (! grep .)
      - run: go vet ./...
      - run: go test ./...
  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@v6.4.0
        with: { node-version: 24 }
      - run: npm install -g pnpm@11.12.0
      - run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - uses: actions/cache@v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web format && pnpm --dir web check && pnpm --dir web lint && pnpm --dir web test:run
      - run: pnpm --dir web exec playwright install --with-deps chromium
      - run: pnpm --dir web test:e2e
      - run: pnpm --dir web test:landing
  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: docker build -f packaging/docker/Dockerfile -t binnacle:ci .
      - run: docker run --rm --entrypoint /usr/local/bin/binnacle binnacle:ci --help || test $$? -eq 1
      - run: |
          export DOCKER_GID=$(getent group docker | cut -d: -f3)
          BINNACLE_SETUP_TOKEN=dummy docker compose -f packaging/docker/docker-compose.yml config
      - run: scripts/validate-coolify-template.sh
