name: release
on:
  pull_request:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Dry-run version/channel validation
        run: |
          set -euo pipefail
          scripts/validate-version.sh v0.1.0-alpha.1 | grep 'channel=edge'
          scripts/validate-version.sh v0.1.0-beta.1 | grep 'channel=beta'
          scripts/validate-version.sh v0.1.0 | grep 'channel=stable'
          ! scripts/validate-version.sh v0.1.0-alpha.1 | grep 'channel=stable'
          ! scripts/validate-version.sh invalid-tag

  publish:
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Validate version
        id: version
        run: scripts/validate-version.sh "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@v4.2.0
      - uses: docker/setup-buildx-action@v4.2.0
      - uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: packaging/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/binnacle:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/binnacle:${{ steps.version.outputs.channel }}
      - uses: actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/binnacle
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
