name: supply-chain
on: [pull_request, push]
permissions: { contents: read }
jobs:
  vuln:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-go@v6.5.0
        with: { go-version: '1.26.x', check-latest: true }
      - run: scripts/govulncheck.sh
      - uses: actions/setup-node@v6.4.0
        with: { node-version: 24 }
      - run: npm install -g pnpm@11.12.0
      - run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"
      - uses: actions/cache@v6.1.0
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      - run: pnpm --dir web audit --audit-level moderate

  licenses:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-go@v6.5.0
        with: { go-version: '1.26.x', check-latest: true }
      - run: go install github.com/google/go-licenses/v2@v2.0.1
      - run: go-licenses check ./... --allowed_licenses=MIT,BSD-2-Clause,BSD-3-Clause,Apache-2.0,ISC,MPL-2.0,AGPL-3.0

  sbom:
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: anchore/sbom-action@v0.24.0
        with:
          format: spdx-json
          output-file: binnacle.spdx.json
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom
          path: binnacle.spdx.json

  scan:
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    permissions: { contents: read, security-events: write }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - run: docker build -f packaging/docker/Dockerfile -t binnacle:scan .
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: binnacle:scan
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
      - uses: github/codeql-action/upload-sarif@v4.37.0
        with:
          sarif_file: trivy.sarif
