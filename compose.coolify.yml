# Source-build deployment for a Git-backed Coolify application.
#
# Coolify settings:
#   Build Pack: Docker Compose
#   Base Directory: /
#   Docker Compose Location: /compose.coolify.yml
#
# Required runtime variables:
#   DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
#   BINNACLE_SETUP_TOKEN=$(openssl rand -hex 32)

services:
  docker-socket-proxy:
    image: ghcr.io/wollomatic/socket-proxy:1.12.3@sha256:9e781fbe79315355d08901832f639119aa332ac27ee6157fc7f2fab5193c8600
    restart: unless-stopped
    read_only: true
    privileged: false
    user: "0:${DOCKER_GID:?DOCKER_GID is required; run export DOCKER_GID=$(getent group docker | cut -d: -f3)}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - '-loglevel=warn'
      - '-allowHEAD=/_ping'
      - '-allowGET=/_ping'
      - '-allowGET=/v1\.[0-9]+/version'
      - '-allowGET=/v1\.[0-9]+/containers/json'
      - '-allowGET=/v1\.[0-9]+/containers/[^/]+/(json|stats|logs)'
      - '-allowGET=/v1\.[0-9]+/events'
      - '-proxysocketendpoint=/var/run/binnacle-docker/docker.sock'
      - '-proxysocketendpointfilemode=0660'
      - '-allowhealthcheck'
      - '-watchdoginterval=60'
      - '-stoponwatchdog'
      - '-shutdowngracetime=5'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - binnacle-docker-api:/var/run/binnacle-docker
    healthcheck:
      test: ["CMD", "./healthcheck"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 32M

  binnacle:
    build:
      context: .
      dockerfile: packaging/docker/Dockerfile

    labels:
      binnacle.name: Binnacle
      binnacle.context: monitoring

    restart: unless-stopped
    read_only: true
    privileged: false
    user: "binnacle:${DOCKER_GID:?DOCKER_GID is required; use the Docker socket group ID}"

    security_opt:
      - no-new-privileges:true

    depends_on:
      docker-socket-proxy:
        condition: service_healthy

    expose:
      - "8080"

    environment:
      BINNACLE_DATA_DIR: /var/lib/binnacle
      BINNACLE_HOST_PROC: /host/proc
      BINNACLE_HOST_SYS: /host/sys
      BINNACLE_HOST_PASSWD: /host/etc/passwd
      BINNACLE_SETUP_TOKEN: ${BINNACLE_SETUP_TOKEN:?BINNACLE_SETUP_TOKEN is required for first-run setup}
      BINNACLE_DOCKER_SOCKET: ${BINNACLE_DOCKER_SOCKET:-/var/run/binnacle-docker/docker.sock}
      BINNACLE_CHECKS_ALLOW_PRIVATE_TARGETS: ${BINNACLE_CHECKS_ALLOW_PRIVATE_TARGETS:-false}
      BINNACLE_MASTER_KEY: ${BINNACLE_MASTER_KEY:-}
      BINNACLE_MASTER_KEY_FILE: ${BINNACLE_MASTER_KEY_FILE:-}
      BINNACLE_COOLIFY_URL: ${BINNACLE_COOLIFY_URL:-}
      BINNACLE_COOLIFY_API_TOKEN: ${BINNACLE_COOLIFY_API_TOKEN:-}
      BINNACLE_COOLIFY_ALLOW_INSECURE_HTTP: ${BINNACLE_COOLIFY_ALLOW_INSECURE_HTTP:-false}
      BINNACLE_FEATURE_ADVANCED_AUTH: ${BINNACLE_FEATURE_ADVANCED_AUTH:-false}
      BINNACLE_FEATURE_PORTABILITY: ${BINNACLE_FEATURE_PORTABILITY:-false}
      BINNACLE_PROMETHEUS_ENABLED: ${BINNACLE_PROMETHEUS_ENABLED:-false}
      BINNACLE_AUTH_MODE: ${BINNACLE_AUTH_MODE:-local}
      BINNACLE_AUTH_PROXY_CIDRS: ${BINNACLE_AUTH_PROXY_CIDRS:-}
      BINNACLE_AUTH_IDENTITY_HEADER: ${BINNACLE_AUTH_IDENTITY_HEADER:-X-Forwarded-User}
      BINNACLE_AUTH_ALLOWED_SUBJECT: ${BINNACLE_AUTH_ALLOWED_SUBJECT:-}
      BINNACLE_NOTIFICATIONS_ALLOW_PRIVATE_TARGETS: ${BINNACLE_NOTIFICATIONS_ALLOW_PRIVATE_TARGETS:-false}
      BINNACLE_NOTIFICATIONS_MAX_CONCURRENCY: ${BINNACLE_NOTIFICATIONS_MAX_CONCURRENCY:-4}
      BINNACLE_NOTIFICATIONS_QUEUE_CAPACITY: ${BINNACLE_NOTIFICATIONS_QUEUE_CAPACITY:-1000}
      BINNACLE_NOTIFICATIONS_DELIVERY_TIMEOUT: ${BINNACLE_NOTIFICATIONS_DELIVERY_TIMEOUT:-15s}
      BINNACLE_NOTIFICATIONS_REMINDER_INTERVAL: ${BINNACLE_NOTIFICATIONS_REMINDER_INTERVAL:-2h}

    volumes:
      - binnacle-data:/var/lib/binnacle
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/passwd:/host/etc/passwd:ro
      - binnacle-docker-api:/var/run/binnacle-docker:ro

    healthcheck:
      test: ["CMD", "/usr/local/bin/binnacle", "--healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  binnacle-data:
  binnacle-docker-api:
