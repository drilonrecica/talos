# Canonical Docker Compose deployment for Binnacle.
# Provide a secure setup token before first start:
#   export BINNACLE_SETUP_TOKEN="$(openssl rand -hex 32)"
# Then run: docker compose -f packaging/docker/docker-compose.yml up -d

services:
  binnacle:
    image: ${BINNACLE_IMAGE:-ghcr.io/drilonrecica/binnacle:stable}
    container_name: binnacle
    labels:
      binnacle.name: Binnacle
      binnacle.context: monitoring
    restart: unless-stopped
    read_only: true
    privileged: false
    user: "binnacle:${DOCKER_GID:?DOCKER_GID is required; run export DOCKER_GID=$(getent group docker | cut -d: -f3)}"
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      BINNACLE_DATA_DIR: /var/lib/binnacle
      BINNACLE_HOST_PROC: /host/proc
      BINNACLE_HOST_SYS: /host/sys
      BINNACLE_HOST_PASSWD: /host/etc/passwd
      BINNACLE_SETUP_TOKEN: ${BINNACLE_SETUP_TOKEN:?BINNACLE_SETUP_TOKEN is required for the first installation}
      BINNACLE_DOCKER_SOCKET: ${BINNACLE_DOCKER_SOCKET:-/var/run/docker.sock}
      BINNACLE_CHECKS_ALLOW_PRIVATE_TARGETS: ${BINNACLE_CHECKS_ALLOW_PRIVATE_TARGETS:-false}
      BINNACLE_MASTER_KEY: ${BINNACLE_MASTER_KEY:-}
      BINNACLE_NOTIFICATIONS_ALLOW_PRIVATE_TARGETS: ${BINNACLE_NOTIFICATIONS_ALLOW_PRIVATE_TARGETS:-false}
      BINNACLE_NOTIFICATIONS_MAX_CONCURRENCY: ${BINNACLE_NOTIFICATIONS_MAX_CONCURRENCY:-4}
      BINNACLE_NOTIFICATIONS_QUEUE_CAPACITY: ${BINNACLE_NOTIFICATIONS_QUEUE_CAPACITY:-1000}
      BINNACLE_NOTIFICATIONS_DELIVERY_TIMEOUT: ${BINNACLE_NOTIFICATIONS_DELIVERY_TIMEOUT:-15s}
      BINNACLE_NOTIFICATIONS_REMINDER_INTERVAL: ${BINNACLE_NOTIFICATIONS_REMINDER_INTERVAL:-2h}
    volumes:
      - binnacle-data:/var/lib/binnacle
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "/usr/local/bin/binnacle", "--healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  binnacle-data:
