# documentation: https://github.com/drilonrecica/binnacle
# slogan: Lightweight, read-only monitoring for Coolify, Docker, and Linux hosts.
# category: monitoring
# tags: monitoring,docker,coolify,host-metrics
# port: 8080

services:
  binnacle:
    image: ghcr.io/drilonrecica/binnacle:stable
    container_name: binnacle
    restart: unless-stopped
    read_only: true
    privileged: false
    user: "binnacle:${DOCKER_GID:?DOCKER_GID is required; run export DOCKER_GID=$(getent group docker | cut -d: -f3)}"
    security_opt:
      - no-new-privileges:true
    environment:
      BINNACLE_DATA_DIR: /var/lib/binnacle
      BINNACLE_HOST_PROC: /host/proc
      BINNACLE_HOST_SYS: /host/sys
      BINNACLE_SETUP_TOKEN: ${BINNACLE_SETUP_TOKEN:?BINNACLE_SETUP_TOKEN is required for the first installation}
    volumes:
      - binnacle-data:/var/lib/binnacle
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1:8080 && printf 'GET /api/v1/session HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q HTTP/1.1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  binnacle-data:
